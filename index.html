<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MoveOut Sale</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;700&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #FAF8F4;
      --surface: #FFFFFF;
      --border: #E8E4DC;
      --text: #1A1714;
      --muted: #7A736A;
      --accent: #2D6A4F;
      --accent-light: #E8F4EE;
      --accent-hover: #235A40;
      --wa: #25D366;
      --wa-hover: #1DA851;
      --tag-bg: #F0EDE6;
      --overlay: rgba(20, 16, 10, 0.72);
      --modal-bg: #FAF8F4;
      --shadow: 0 4px 24px rgba(0,0,0,0.08);
      --shadow-hover: 0 8px 32px rgba(0,0,0,0.13);
    }

    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
    }

    /* ── HEADER ── */
    header {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 0 2rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
      height: 72px;
      position: sticky;
      top: 0;
      z-index: 100;
    }

    .logo {
      font-family: 'Playfair Display', serif;
      font-size: 1.6rem;
      font-weight: 700;
      color: var(--text);
      letter-spacing: -0.5px;
    }

    .logo span {
      color: var(--accent);
    }

    .header-tag {
      background: var(--accent-light);
      color: var(--accent);
      font-size: 0.75rem;
      font-weight: 500;
      padding: 4px 12px;
      border-radius: 20px;
      letter-spacing: 0.5px;
    }

    /* ── HERO ── */
    .hero {
      text-align: center;
      padding: 4rem 2rem 2.5rem;
      max-width: 600px;
      margin: 0 auto;
    }

    .hero-eyebrow {
      font-size: 0.8rem;
      font-weight: 500;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 1rem;
    }

    .hero h1 {
      font-family: 'Playfair Display', serif;
      font-size: clamp(2rem, 5vw, 3rem);
      font-weight: 700;
      line-height: 1.2;
      color: var(--text);
      margin-bottom: 1rem;
    }

    .hero p {
      font-size: 1rem;
      color: var(--muted);
      font-weight: 300;
      line-height: 1.7;
    }

    /* ── FILTER BAR ── */
    .filter-bar {
      display: flex;
      gap: 8px;
      justify-content: center;
      flex-wrap: wrap;
      padding: 1.5rem 2rem 2rem;
    }

    .filter-btn {
      background: var(--surface);
      border: 1px solid var(--border);
      color: var(--muted);
      font-family: 'DM Sans', sans-serif;
      font-size: 0.85rem;
      font-weight: 400;
      padding: 8px 18px;
      border-radius: 24px;
      cursor: pointer;
      transition: all 0.2s;
    }

    .filter-btn:hover { border-color: var(--accent); color: var(--accent); }
    .filter-btn.active {
      background: var(--accent);
      border-color: var(--accent);
      color: #fff;
      font-weight: 500;
    }

    /* ── GRID ── */
    .grid-section {
      max-width: 1100px;
      margin: 0 auto;
      padding: 0 2rem 5rem;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
      gap: 1.5rem;
    }

    /* ── CARD ── */
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 16px;
      overflow: hidden;
      cursor: pointer;
      transition: transform 0.2s ease, box-shadow 0.2s ease;
      position: relative;
    }

    .card:hover {
      transform: translateY(-4px);
      box-shadow: var(--shadow-hover);
    }

    .card-img {
      width: 100%;
      aspect-ratio: 4/3;
      object-fit: cover;
      display: block;
      background: var(--tag-bg);
    }

    .card-img-placeholder {
      width: 100%;
      aspect-ratio: 4/3;
      background: linear-gradient(135deg, #F0EDE6 0%, #E8E4DC 100%);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 3rem;
    }

    .card-body {
      padding: 1rem 1.1rem 1.2rem;
    }

    .card-tag {
      display: inline-block;
      font-size: 0.7rem;
      font-weight: 500;
      letter-spacing: 0.8px;
      text-transform: uppercase;
      background: var(--tag-bg);
      color: var(--muted);
      padding: 3px 10px;
      border-radius: 12px;
      margin-bottom: 0.5rem;
    }

    .card-title {
      font-family: 'Playfair Display', serif;
      font-size: 1.05rem;
      font-weight: 500;
      color: var(--text);
      line-height: 1.35;
      margin-bottom: 0.35rem;
    }

    .card-price {
      font-size: 1.1rem;
      font-weight: 500;
      color: var(--accent);
    }

    .sold-badge {
      position: absolute;
      top: 12px;
      right: 12px;
      background: #E24B4A;
      color: #fff;
      font-size: 0.7rem;
      font-weight: 500;
      padding: 4px 10px;
      border-radius: 12px;
      letter-spacing: 0.5px;
      text-transform: uppercase;
    }

    .card.sold { opacity: 0.65; pointer-events: none; }

    /* ── MODAL OVERLAY ── */
    .modal-overlay {
      position: fixed;
      inset: 0;
      background: var(--overlay);
      z-index: 500;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1rem;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.2s;
    }

    .modal-overlay.open {
      opacity: 1;
      pointer-events: all;
    }

    .modal {
      background: var(--modal-bg);
      border-radius: 20px;
      width: 100%;
      max-width: 660px;
      max-height: 90vh;
      overflow-y: auto;
      box-shadow: 0 24px 60px rgba(0,0,0,0.25);
      transform: translateY(20px) scale(0.97);
      transition: transform 0.25s ease;
    }

    .modal-overlay.open .modal {
      transform: translateY(0) scale(1);
    }

    .modal-img {
      width: 100%;
      aspect-ratio: 16/9;
      object-fit: cover;
      border-radius: 20px 20px 0 0;
      display: block;
      background: var(--tag-bg);
    }

    .modal-img-placeholder {
      width: 100%;
      aspect-ratio: 16/9;
      background: linear-gradient(135deg, #F0EDE6 0%, #E8E4DC 100%);
      border-radius: 20px 20px 0 0;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 5rem;
    }

    .modal-body {
      padding: 1.5rem 1.75rem 2rem;
    }

    .modal-header {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 1rem;
      margin-bottom: 0.75rem;
    }

    .modal-title {
      font-family: 'Playfair Display', serif;
      font-size: 1.5rem;
      font-weight: 700;
      line-height: 1.3;
    }

    .modal-price {
      font-size: 1.4rem;
      font-weight: 500;
      color: var(--accent);
      white-space: nowrap;
    }

    .modal-desc {
      font-size: 0.95rem;
      color: var(--muted);
      line-height: 1.75;
      margin-bottom: 1.25rem;
    }

    .payment-box {
      background: var(--accent-light);
      border: 1px solid #C8E6D4;
      border-radius: 12px;
      padding: 1rem 1.1rem;
      margin-bottom: 1.5rem;
    }

    .payment-box h4 {
      font-size: 0.8rem;
      font-weight: 500;
      letter-spacing: 1px;
      text-transform: uppercase;
      color: var(--accent);
      margin-bottom: 0.4rem;
    }

    .payment-box p {
      font-size: 0.9rem;
      color: #2D5A3F;
      line-height: 1.6;
    }

    .modal-actions {
      display: flex;
      gap: 10px;
    }

    .btn-wa {
      flex: 1;
      background: var(--wa);
      color: #fff;
      border: none;
      border-radius: 12px;
      padding: 14px 20px;
      font-family: 'DM Sans', sans-serif;
      font-size: 0.95rem;
      font-weight: 500;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      transition: background 0.2s;
      text-decoration: none;
    }

    .btn-wa:hover { background: var(--wa-hover); }

    .btn-close {
      background: var(--surface);
      border: 1px solid var(--border);
      color: var(--muted);
      border-radius: 12px;
      padding: 14px 18px;
      font-family: 'DM Sans', sans-serif;
      font-size: 0.9rem;
      cursor: pointer;
      transition: all 0.2s;
    }

    .btn-close:hover { border-color: var(--accent); color: var(--accent); }

    /* ── FOOTER ── */
    footer {
      text-align: center;
      padding: 2rem;
      font-size: 0.8rem;
      color: var(--muted);
      border-top: 1px solid var(--border);
    }

    /* ── WA ICON SVG ── */
    .wa-icon { width: 20px; height: 20px; fill: white; flex-shrink: 0; }

    /* ── EMPTY STATE ── */
    .empty {
      text-align: center;
      padding: 4rem 2rem;
      color: var(--muted);
      grid-column: 1/-1;
    }

    @media (max-width: 600px) {
      header { padding: 0 1rem; }
      .hero { padding: 2.5rem 1rem 1.5rem; }
      .grid-section { padding: 0 1rem 4rem; }
      .modal-body { padding: 1.25rem 1.25rem 1.75rem; }
      .modal-actions { flex-direction: column; }
    }
  </style>
</head>
<body>

<header>
  <div class="logo">MoveOut<span>.</span></div>
  <span class="header-tag">Everything Must Go</span>
</header>

<section class="hero">
  <p class="hero-eyebrow">Clearance Sale</p>
  <h1>Quality stuff, honest prices.</h1>
  <p>Browse items below. Click any listing for full details and to connect with me directly on WhatsApp.</p>
</section>

<div class="filter-bar" id="filterBar">
  <button class="filter-btn active" data-cat="all">All</button>
</div>

<section class="grid-section">
  <div class="grid" id="grid"></div>
</section>

<footer>
  <p>MoveOut Sale &nbsp;·&nbsp; Contact via WhatsApp &nbsp;·&nbsp; All items are final sale</p>
</footer>

<!-- MODAL -->
<div class="modal-overlay" id="modalOverlay" onclick="closeModalOnBg(event)">
  <div class="modal" id="modal">
    <div id="modalImg"></div>
    <div class="modal-body">
      <div class="modal-header">
        <h2 class="modal-title" id="modalTitle"></h2>
        <div class="modal-price" id="modalPrice"></div>
      </div>
      <p class="modal-desc" id="modalDesc"></p>
      <div class="payment-box">
        <h4>Payment &amp; Pickup</h4>
        <p id="modalPayment"></p>
      </div>
      <div class="modal-actions">
        <a class="btn-wa" id="modalWA" href="#" target="_blank">
          <svg class="wa-icon" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 005.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 00-3.48-8.413z"/></svg>
          Buy via WhatsApp
        </a>
        <button class="btn-close" onclick="closeModal()">Close</button>
      </div>
    </div>
  </div>
</div>

<script>
  // ─────────────────────────────────────────────────────────────
  //  YOUR WHATSAPP NUMBER (digits only, with country code)
  // ─────────────────────────────────────────────────────────────
  const WA_NUMBER = "918805799434";

  // ─────────────────────────────────────────────────────────────
  //  YOUR LISTINGS — edit / add / remove objects here
  //
  //  Fields:
  //    id        : unique number
  //    title     : item name
  //    category  : e.g. "Furniture", "Electronics", "Clothes" — used for filter tabs
  //    price     : e.g. "₹1,200" or "₹800 (negotiable)"
  //    description: full detail shown in the popup
  //    payment   : your payment / pickup instructions
  //    image     : URL to a photo, OR leave as "" to show an emoji placeholder
  //    emoji     : shown when image is empty
  //    sold      : true or false
  // ─────────────────────────────────────────────────────────────
  const LISTINGS = [
    {
      id: 1,
      title: "IKEA Kallax Shelf Unit",
      category: "Furniture",
      price: "₹3,500",
      description: "White 2×4 Kallax shelving unit in excellent condition. No scratches or dents. Perfect for books, storage boxes, or a TV unit. Dimensions: 77×147 cm. Self-pickup only, I can help disassemble.",
      payment: "GPay / PhonePe preferred. Pickup from my place — message me to arrange a time.",
      image: "",
      emoji: "🪵",
      sold: false
    },
    {
      id: 2,
      title: "Sony WH-1000XM3 Headphones",
      category: "Electronics",
      price: "₹7,500",
      description: "Sony noise-cancelling headphones. Used for about a year, in great working condition. Comes with original carrying case and 3.5mm cable. Battery health excellent — lasts 28+ hours.",
      payment: "UPI only. Will courier via DTDC at buyer's cost (approx ₹150–200 anywhere in India). Local pickup also welcome.",
      image: "",
      emoji: "🎧",
      sold: false
    },
    {
      id: 3,
      title: "Vintage Wooden Study Table",
      category: "Furniture",
      price: "₹2,200",
      description: "Solid wood study table, 4ft wide × 2ft deep. Has a small scuff on the left side (visible in photos). Sturdy and very heavy — buyer needs to arrange their own transport. Great character piece.",
      payment: "Cash preferred. Buyer arranges pickup transport. GPay also accepted.",
      image: "",
      emoji: "📦",
      sold: false
    },
    {
      id: 4,
      title: "Mi 43\" 4K Smart TV",
      category: "Electronics",
      price: "₹14,000",
      description: "Mi LED Smart TV 4X 43 inch. Purchased in 2021. Works perfectly, no dead pixels. Comes with original remote and power cable (no stand — wall-mounted currently). Android TV with Google Assistant.",
      payment: "UPI or NEFT. Local self-pickup strongly preferred due to size. Will help with safe packing.",
      image: "",
      emoji: "📺",
      sold: false
    },
    {
      id: 5,
      title: "Bundle: Kitchen Items",
      category: "Kitchen",
      price: "₹900",
      description: "Bundle includes: prestige pressure cooker (3L), a set of 3 steel kadais, 1 non-stick pan (minor wear), and assorted plates & bowls. All clean and working. Selling as a single bundle only.",
      payment: "Cash or UPI. Pickup only — no shipping due to weight.",
      image: "",
      emoji: "🍳",
      sold: false
    },
    {
      id: 6,
      title: "Godrej Almirah (Steel)",
      category: "Furniture",
      price: "₹4,000",
      description: "Godrej steel almirah, double-door, with locker. Height ~5.5 ft. Slight surface rust on back panel (not visible when placed against a wall). Both keys available. Very sturdy.",
      payment: "Cash only. Buyer arranges transport — it's very heavy. GPay also fine.",
      image: "",
      emoji: "🗄️",
      sold: true
    },
  ];

  // ─────────────────────────────────────────────────────────────
  //  RENDER
  // ─────────────────────────────────────────────────────────────
  let activeCategory = "all";

  function buildFilters() {
    const cats = [...new Set(LISTINGS.map(l => l.category))];
    const bar = document.getElementById("filterBar");
    cats.forEach(cat => {
      const btn = document.createElement("button");
      btn.className = "filter-btn";
      btn.dataset.cat = cat;
      btn.textContent = cat;
      btn.onclick = () => setFilter(cat, btn);
      bar.appendChild(btn);
    });
  }

  function setFilter(cat, btn) {
    activeCategory = cat;
    document.querySelectorAll(".filter-btn").forEach(b => b.classList.remove("active"));
    btn.classList.add("active");
    renderGrid();
  }

  function renderGrid() {
    const grid = document.getElementById("grid");
    const items = activeCategory === "all"
      ? LISTINGS
      : LISTINGS.filter(l => l.category === activeCategory);

    if (!items.length) {
      grid.innerHTML = '<div class="empty"><p>No items in this category.</p></div>';
      return;
    }

    grid.innerHTML = items.map(item => `
      <div class="card ${item.sold ? 'sold' : ''}" onclick="${item.sold ? '' : `openModal(${item.id})`}">
        ${item.image
          ? `<img class="card-img" src="${item.image}" alt="${item.title}" loading="lazy" />`
          : `<div class="card-img-placeholder">${item.emoji}</div>`
        }
        ${item.sold ? '<span class="sold-badge">Sold</span>' : ''}
        <div class="card-body">
          <span class="card-tag">${item.category}</span>
          <p class="card-title">${item.title}</p>
          <p class="card-price">${item.price}</p>
        </div>
      </div>
    `).join('');
  }

  // ─────────────────────────────────────────────────────────────
  //  MODAL
  // ─────────────────────────────────────────────────────────────
  function openModal(id) {
    const item = LISTINGS.find(l => l.id === id);
    if (!item) return;

    document.getElementById("modalTitle").textContent = item.title;
    document.getElementById("modalPrice").textContent = item.price;
    document.getElementById("modalDesc").textContent = item.description;
    document.getElementById("modalPayment").textContent = item.payment;

    const imgEl = document.getElementById("modalImg");
    imgEl.innerHTML = item.image
      ? `<img class="modal-img" src="${item.image}" alt="${item.title}" />`
      : `<div class="modal-img-placeholder">${item.emoji}</div>`;

    const msg = encodeURIComponent(`Hi! I saw your MoveOut Sale listing and I'm interested in: *${item.title}* (${item.price}). Is it still available?`);
    document.getElementById("modalWA").href = `https://wa.me/${WA_NUMBER}?text=${msg}`;

    document.getElementById("modalOverlay").classList.add("open");
    document.body.style.overflow = "hidden";
  }

  function closeModal() {
    document.getElementById("modalOverlay").classList.remove("open");
    document.body.style.overflow = "";
  }

  function closeModalOnBg(e) {
    if (e.target === document.getElementById("modalOverlay")) closeModal();
  }

  document.addEventListener("keydown", e => { if (e.key === "Escape") closeModal(); });

  // ─────────────────────────────────────────────────────────────
  //  INIT
  // ─────────────────────────────────────────────────────────────
  buildFilters();
  renderGrid();

  // "All" filter button click
  document.querySelector('.filter-btn[data-cat="all"]').onclick = function() {
    activeCategory = "all";
    document.querySelectorAll(".filter-btn").forEach(b => b.classList.remove("active"));
    this.classList.add("active");
    renderGrid();
  };
</script>
</body>
</html>
